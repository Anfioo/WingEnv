<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WingEnv</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .splash-container {
        text-align: center;
        color: #333;
        background: rgba(255, 255, 255, 0.9);
        padding: 40px 60px;
        border-radius: 12px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
      }
      h1 {
        margin: 0 0 10px 0;
        font-size: 24px;
        font-weight: 600;
      }
      p {
        margin: 0;
        color: #666;
        font-size: 14px;
      }
      .spinner {
        margin-top: 20px;
        width: 24px;
        height: 24px;
        border: 3px solid #e0e0e0;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="splash-container">
      <h1>WingEnv</h1>
      <p>Loading...</p>
      <div class="spinner"></div>
    </div>
  </body>
</html>
